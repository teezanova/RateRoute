<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>RateRoute</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/styles.css?v=105" />
</head>
<body>
  <header class="topbar">
    <div class="container">
      <div class="brand">
        <div class="logo" aria-hidden="true">RR</div>
        <div>
          <h1>RateRoute</h1>
          <p class="sub">Best path to convert TWD into THB</p>
        </div>
      </div>

      <div class="actions">
        <button id="themeBtn" class="btn" type="button" aria-label="Toggle theme">
          <span class="btnIcon" aria-hidden="true">
            <svg class="icon iconMoon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            <svg class="icon iconSun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
          </span>
          <span id="themeText">Light</span>
        </button>

        <button id="refreshBtn" class="btn" type="button">
          <span class="btnIcon" aria-hidden="true">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/></svg>
          </span>
          <span>Refresh</span>
        </button>
      </div>
    </div>
  </header>

  <main class="container vertical">
    <section class="panel">
      <div class="panelRow">
        <label class="field">
          <span>Amount (TWD)</span>
          <input id="amountInput" type="number" inputmode="decimal" min="0" step="1" placeholder="e.g. 10000" />
        </label>
      </div>

      <div class="statusRow" aria-live="polite">
        <div id="loadingPill" class="pill hidden">Loading rates…</div>
        <div id="errorPill" class="pill error hidden"></div>
        <div id="stalePill" class="pill warn hidden"></div>
        <div id="updatedPill" class="pill subtle hidden"></div>
      </div>
    <div class="sourceRow" id="sourceRow">
  <div class="sourceCard" id="srCard">
    <div class="sourceTop">
      <div class="sourceName">SuperRich</div>
      <a class="sourceLink" href="https://www.superrichthailand.com/#!/en/exchange" target="_blank" rel="noopener">Open</a>
    </div>
    <div class="sourceMeta" id="srMeta">—</div>
  </div>

  <div class="sourceCard" id="ctCard">
    <div class="sourceTop">
      <div class="sourceName">Cathay</div>
      <a class="sourceLink" href="https://www.cathaybk.com.tw/cathaybk/personal/product/deposit/currency-billboard/" target="_blank" rel="noopener">Open</a>
    </div>
    <div class="sourceMeta" id="ctMeta">—</div>
  </div>
</div>
    </section>

    <section class="summary">
      <div class="summaryCard">
        <div class="summaryTop">
          <span class="sectionLabel">Best route</span>
          <div class="chip" id="bestChip">—</div>
        </div>
        <p class="summaryText" id="bestText">Enter an amount to compare routes.</p>
      </div>
    </section>

    <section class="vlist" id="routesGrid"></section>

    <footer class="footer">
      <div class="muted small">
        Cathay sell rates adjusted for EVA Air cardholder discount.
      </div>
    </footer>
  </main>

  <script src="/app.js?v=105"></script>
</body>
</html>
